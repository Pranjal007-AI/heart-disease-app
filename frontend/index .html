<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫀</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cardiac Risk Predictor — Pranjal Parashar</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    #c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:#060610}
    .ui{position:relative;z-index:10;font-family:'Segoe UI',sans-serif;padding-bottom:60px}

    .hero{text-align:center;padding:28px 20px 10px;display:flex;flex-direction:column;align-items:center}
    .heart-container{position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
    .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid #ff3f5b;animation:ringP 1.4s ease-in-out infinite}
    .ring2{position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(255,63,91,0.28);animation:ringP 1.4s ease-in-out infinite 0.3s}
    @keyframes ringP{0%{transform:scale(0.92);opacity:0.8}50%{transform:scale(1.08);opacity:0.35}100%{transform:scale(0.92);opacity:0.8}}
    .heart-svg{width:72px;height:72px;animation:hbeat 1.4s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(255,63,91,0.7)) drop-shadow(0 0 22px rgba(255,63,91,0.3));position:relative;z-index:2}
    @keyframes hbeat{0%{transform:scale(1)}10%{transform:scale(1.18)}20%{transform:scale(1)}30%{transform:scale(1.12)}40%,100%{transform:scale(1)}}
    .ecg-line{width:100%;overflow:hidden;margin-bottom:6px}
    .ecg-path{stroke-dasharray:400;stroke-dashoffset:400;animation:drawECG 1.4s ease-in-out infinite}
    @keyframes drawECG{0%{stroke-dashoffset:400;opacity:1}70%{stroke-dashoffset:0;opacity:1}90%{stroke-dashoffset:0;opacity:0.3}100%{stroke-dashoffset:400;opacity:0}}
    .by-name{font-size:0.72rem;font-weight:400;color:rgba(255,255,255,0.38);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:4px}
    .by-name span{color:#ff3f5b;font-weight:700;letter-spacing:0.1em}
    .hero h1{font-size:clamp(1.5rem,4vw,2.3rem);font-weight:300;color:#fff;letter-spacing:-0.02em;margin-bottom:5px}
    .hero h1 em{color:#ff3f5b;font-style:italic;font-weight:700}
    .hero p{color:rgba(255,255,255,0.32);font-size:0.74rem;letter-spacing:0.1em;text-transform:uppercase}

    .form-wrap{max-width:740px;margin:18px auto 0;padding:0 14px}
    .glass{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:22px;margin-bottom:14px}
    .sec-title{font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#ff3f5b;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .sec-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
    .field{display:flex;flex-direction:column;gap:5px}
    .field label{font-size:0.7rem;color:rgba(255,255,255,0.58);font-weight:500}
    .slider-field{display:flex;flex-direction:column;gap:6px}
    .slider-field label{font-size:0.7rem;color:rgba(255,255,255,0.58);font-weight:500;display:flex;justify-content:space-between;align-items:center}
    .slider-field label span{color:#ff3f5b;font-weight:700;font-size:0.82rem;min-width:40px;text-align:right}
    .hint{font-size:0.62rem;color:rgba(255,255,255,0.26)}

    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:rgba(255,255,255,0.12);border-radius:100px;outline:none;cursor:pointer;border:none;padding:0}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#ff3f5b;border:2px solid #ff8fa0;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 0 8px rgba(255,63,91,0.5)}
    input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);box-shadow:0 0 16px rgba(255,63,91,0.75)}
    input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#ff3f5b;border:2px solid #ff8fa0;cursor:pointer}

    select{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:9px;padding:9px 30px 9px 12px;font-family:inherit;font-size:0.85rem;color:#fff;outline:none;width:100%;appearance:none;transition:border-color 0.2s,background 0.2s}
    select:focus{border-color:rgba(255,63,91,0.6);background:rgba(255,63,91,0.08)}
    select option{background:#111;color:#fff}
    .sw{position:relative}
    .sw::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.4);pointer-events:none;font-size:0.72rem}

    .btn-section{margin-bottom:14px;display:flex;justify-content:center;padding:8px 0}
    .btn{background:#ff3f5b;color:#fff;border:2px solid #ff6b7d;border-radius:14px;padding:15px 60px;font-family:inherit;font-size:1rem;font-weight:800;letter-spacing:0.06em;cursor:pointer;transition:transform 0.15s,box-shadow 0.2s;min-width:220px;text-align:center;box-shadow:0 0 0 4px rgba(255,63,91,0.2),0 8px 32px rgba(255,63,91,0.45)}
    .btn:hover{transform:translateY(-3px);box-shadow:0 0 0 6px rgba(255,63,91,0.3),0 16px 48px rgba(255,63,91,0.6);background:#ff1f3f}
    .btn:active{transform:translateY(0)}
    .btn.busy{opacity:0.65;pointer-events:none}
    .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    #err{display:none;background:rgba(255,63,91,0.09);border:1px solid rgba(255,63,91,0.3);border-radius:12px;padding:13px 16px;color:#ff9aaa;font-size:0.82rem;margin-bottom:14px;line-height:1.6}
    #result{display:none;animation:riseIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both}
    @keyframes riseIn{from{opacity:0;transform:translateY(24px) scale(0.96)}to{opacity:1;transform:none}}
    .rcard{border-radius:18px;padding:28px;border:1px solid rgba(255,255,255,0.1);margin-bottom:14px}
    .rcard.bad{background:rgba(255,63,91,0.13);border-color:rgba(255,63,91,0.35)}
    .rcard.good{background:rgba(31,214,160,0.1);border-color:rgba(31,214,160,0.28)}
    .r-icon{font-size:2.4rem;display:block;margin-bottom:10px}
    .r-title{font-size:1.7rem;font-weight:300;margin-bottom:4px}
    .rcard.bad .r-title{color:#ff3f5b}
    .rcard.good .r-title{color:#1fd6a0}
    .r-sub{color:rgba(255,255,255,0.4);font-size:0.82rem;margin-bottom:18px}
    .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .sbox{flex:1;min-width:90px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:11px;padding:12px;text-align:center}
    .sval{font-size:1.6rem;font-weight:300;line-height:1;margin-bottom:4px}
    .rcard.bad .sval{color:#ff3f5b}
    .rcard.good .sval{color:#1fd6a0}
    .slbl{font-size:0.64rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em}
    .bar-wrap{background:rgba(255,255,255,0.07);border-radius:100px;height:5px;margin:14px 0 6px;overflow:hidden}
    .bar{height:100%;border-radius:100px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);width:0}
    .rcard.bad .bar{background:linear-gradient(90deg,#ff3f5b,#ff8fa0)}
    .rcard.good .bar{background:linear-gradient(90deg,#1fd6a0,#7fffd4)}
    .bar-lbl{font-size:0.67rem;color:rgba(255,255,255,0.28)}
    .msg{margin-top:13px;padding:12px 14px;background:rgba(255,255,255,0.05);border-left:3px solid;border-radius:0 9px 9px 0;font-size:0.83rem;line-height:1.6;color:rgba(255,255,255,0.58)}
    .rcard.bad .msg{border-color:#ff3f5b}
    .rcard.good .msg{border-color:#1fd6a0}
    .footer{text-align:center;padding:10px 20px 20px;color:rgba(255,255,255,0.18);font-size:0.67rem;letter-spacing:0.04em}
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="hero">
    <div class="heart-container">
      <div class="ring2"></div>
      <div class="ring"></div>
      <svg class="heart-svg" viewBox="0 0 100 100" fill="none">
        <path d="M50 85 C50 85 10 58 10 32 C10 18 20 10 32 10 C40 10 47 15 50 20 C53 15 60 10 68 10 C80 10 90 18 90 32 C90 58 50 85 50 85Z" fill="#ff3f5b" opacity="0.92"/>
        <polyline points="22,48 30,48 34,36 38,60 42,44 46,48 54,48 58,40 62,54 66,48 78,48" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      </svg>
    </div>
    <div class="ecg-line">
      <svg width="220" height="28" viewBox="0 0 220 28">
        <polyline class="ecg-path" points="0,14 30,14 40,14 50,2 60,26 70,14 80,14 100,14 110,6 120,22 130,14 150,14 160,14 170,2 180,26 190,14 220,14" fill="none" stroke="#ff3f5b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="by-name">by <span>Pranjal Parashar</span></p>
    <h1>Cardiac Risk <em>Predictor</em></h1>
    <p>KNN Model &nbsp;·&nbsp; Adjust sliders &amp; select options</p>
  </div>

  <div class="form-wrap">
    <form id="pForm">

      <div class="glass">
        <div class="sec-title">Basic Information</div>
        <div class="grid">

          <div class="slider-field">
            <label>Age (years) <span id="vAge">50</span></label>
            <input type="range" name="Age" min="1" max="100" value="50" oninput="document.getElementById('vAge').textContent=this.value"/>
          </div>

          <div class="field">
            <label>Sex</label>
            <div class="sw"><select name="Sex" required>
              <option value="" disabled selected>Select</option>
              <option value="M">Male (M)</option>
              <option value="F">Female (F)</option>
            </select></div>
          </div>

          <div class="slider-field">
            <label>Resting BP <span id="vBP">130</span></label>
            <input type="range" name="RestingBP" min="80" max="220" value="130" oninput="document.getElementById('vBP').textContent=this.value"/>
            <span class="hint">mm Hg</span>
          </div>

          <div class="slider-field">
            <label>Cholesterol <span id="vChol">245</span></label>
            <input type="range" name="Cholesterol" min="0" max="600" value="245" oninput="document.getElementById('vChol').textContent=this.value"/>
            <span class="hint">mg/dl</span>
          </div>

          <div class="field">
            <label>Fasting Blood Sugar</label>
            <div class="sw"><select name="FastingBS" required>
              <option value="" disabled selected>Select</option>
              <option value="1">&gt; 120 mg/dl (Yes)</option>
              <option value="0">&#8804; 120 mg/dl (No)</option>
            </select></div>
          </div>

          <div class="slider-field">
            <label>Max Heart Rate <span id="vHR">150</span></label>
            <input type="range" name="MaxHR" min="60" max="220" value="150" oninput="document.getElementById('vHR').textContent=this.value"/>
            <span class="hint">bpm</span>
          </div>

        </div>
      </div>

      <div class="glass">
        <div class="sec-title">Clinical Parameters</div>
        <div class="grid">

          <div class="field">
            <label>Chest Pain Type</label>
            <div class="sw"><select name="ChestPainType" required>
              <option value="" disabled selected>Select</option>
              <option value="ASY">ASY &#8212; Asymptomatic</option>
              <option value="ATA">ATA &#8212; Atypical Angina</option>
              <option value="NAP">NAP &#8212; Non-Anginal Pain</option>
              <option value="TA">TA &#8212; Typical Angina</option>
            </select></div>
          </div>

          <div class="field">
            <label>Resting ECG</label>
            <div class="sw"><select name="RestingECG" required>
              <option value="" disabled selected>Select</option>
              <option value="Normal">Normal</option>
              <option value="ST">ST &#8212; Abnormality</option>
              <option value="LVH">LVH &#8212; Hypertrophy</option>
            </select></div>
          </div>

          <div class="field">
            <label>Exercise Angina</label>
            <div class="sw"><select name="ExerciseAngina" required>
              <option value="" disabled selected>Select</option>
              <option value="Y">Yes (Y)</option>
              <option value="N">No (N)</option>
            </select></div>
          </div>

          <div class="slider-field">
            <label>ST Depression (Oldpeak) <span id="vOP">1.5</span></label>
            <input type="range" name="Oldpeak" min="-2" max="8" step="0.1" value="1.5" oninput="document.getElementById('vOP').textContent=parseFloat(this.value).toFixed(1)"/>
            <span class="hint">Exercise vs Rest</span>
          </div>

          <div class="field">
            <label>ST Slope</label>
            <div class="sw"><select name="ST_Slope" required>
              <option value="" disabled selected>Select</option>
              <option value="Up">Up</option>
              <option value="Flat">Flat</option>
              <option value="Down">Down</option>
            </select></div>
          </div>

        </div>
      </div>

      <div class="btn-section">
        <button type="submit" class="btn" id="btn">&#9889; PREDICT RISK</button>
      </div>
      <div id="err"></div>
    </form>

    <div id="result">
      <div class="rcard" id="rcard">
        <span class="r-icon" id="ricon"></span>
        <div class="r-title" id="rtitle"></div>
        <div class="r-sub"   id="rsub"></div>
        <div class="stats">
          <div class="sbox"><div class="sval" id="s1"></div><div class="slbl">Confidence</div></div>
          <div class="sbox"><div class="sval" id="s2"></div><div class="slbl">Risk</div></div>
          <div class="sbox"><div class="sval" id="s3"></div><div class="slbl">Result</div></div>
        </div>
        <div class="bar-wrap"><div class="bar" id="bar"></div></div>
        <div class="bar-lbl" id="blbl"></div>
        <div class="msg" id="rmsg"></div>
      </div>
    </div>

    <div class="footer">&#9888;&#65039; Educational purposes only &nbsp;&middot;&nbsp; Consult a qualified cardiologist</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // Three.js particles background
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x060610, 1);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 28);

  const N = 280, geo = new THREE.BufferGeometry();
  const pos = new Float32Array(N * 3), vel = new Float32Array(N * 3), col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const i3 = i * 3;
    pos[i3]   = (Math.random() - 0.5) * 80;
    pos[i3+1] = (Math.random() - 0.5) * 50;
    pos[i3+2] = (Math.random() - 0.5) * 40;
    vel[i3]   = (Math.random() - 0.5) * 0.01;
    vel[i3+1] = (Math.random() - 0.5) * 0.01;
    vel[i3+2] = (Math.random() - 0.5) * 0.005;
    const r = Math.random() > 0.4;
    col[i3] = r ? 1.0 : 0.85; col[i3+1] = r ? 0.15 : 0.85; col[i3+2] = r ? 0.22 : 0.9;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.2, vertexColors: true, transparent: true, opacity: 0.65 })));
  scene.add(new THREE.AmbientLight(0xffffff, 0.3));
  const dl = new THREE.DirectionalLight(0xff3f5b, 1.0); dl.position.set(5, 10, 8); scene.add(dl);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let mx = 0, my = 0;
  window.addEventListener('mousemove', e => {
    mx = (e.clientX / window.innerWidth - 0.5) * 2;
    my = -(e.clientY / window.innerHeight - 0.5) * 2;
  });

  const pa = geo.attributes.position.array;
  (function animate() {
    requestAnimationFrame(animate);
    for (let i = 0; i < N; i++) {
      const i3 = i * 3;
      pa[i3] += vel[i3]; pa[i3+1] += vel[i3+1]; pa[i3+2] += vel[i3+2];
      if (pa[i3]   >  40) pa[i3]   = -40; if (pa[i3]   < -40) pa[i3]   =  40;
      if (pa[i3+1] >  25) pa[i3+1] = -25; if (pa[i3+1] < -25) pa[i3+1] =  25;
      if (pa[i3+2] >  20) pa[i3+2] = -20; if (pa[i3+2] < -20) pa[i3+2] =  20;
    }
    geo.attributes.position.needsUpdate = true;
    camera.position.x = mx * 1.2; camera.position.y = my * 0.7;
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  })();

  // ⚠️ Apna Render URL yahan daalein after deployment
  const API = "http://127.0.0.1:8000";

  document.getElementById('pForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    const res = document.getElementById('result');
    btn.classList.add('busy');
    btn.innerHTML = '<span class="spin"></span>Analysing&hellip;';
    res.style.display = 'none'; err.style.display = 'none';

    const fd = new FormData(e.target), body = {};
    fd.forEach((v, k) => {
      if (['Age','RestingBP','Cholesterol','FastingBS','MaxHR'].includes(k)) body[k] = parseInt(v, 10);
      else if (k === 'Oldpeak') body[k] = parseFloat(v);
      else body[k] = v;
    });

    try {
      const r = await fetch(`${API}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) { const j = await r.json(); throw new Error(j.detail || 'Server error'); }
      showResult(await r.json());
    } catch(ex) {
      err.style.display = 'block';
      err.innerHTML = '<strong>&#9888; Error:</strong> ' + ex.message + '<br><br>FastAPI chalao: <code style="color:#ff9aaa">uvicorn main:app --reload --port 8000</code>';
    } finally {
      btn.classList.remove('busy');
      btn.innerHTML = '&#9889; PREDICT RISK';
    }
  });

  function showResult(d) {
    const bad = d.prediction === 1;
    document.getElementById('rcard').className = 'rcard ' + (bad ? 'bad' : 'good');
    document.getElementById('ricon').textContent  = bad ? '🫀' : '💚';
    document.getElementById('rtitle').textContent = d.result;
    document.getElementById('rsub').textContent   = bad ? 'Elevated cardiac risk detected.' : 'Parameters within healthy range.';
    document.getElementById('s1').textContent = d.probability + '%';
    document.getElementById('s2').textContent = d.risk_level.split(' ')[0];
    document.getElementById('s3').textContent = bad ? 'Positive' : 'Negative';
    document.getElementById('rmsg').textContent  = d.message;
    document.getElementById('blbl').textContent  = 'Model confidence: ' + d.probability + '%';
    const res = document.getElementById('result');
    res.style.display = 'block';
    setTimeout(() => document.getElementById('bar').style.width = d.probability + '%', 80);
    res.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
